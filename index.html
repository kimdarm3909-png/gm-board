<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>지엠돌려막기</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f6f8;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 40px;
      border-radius: 20px;
      width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .primary {
      background: black;
      color: white;
    }

    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="box" id="authBox">
  <h2>지엠돌려막기</h2>
  <p>등록된 이메일만 로그인 가능합니다.</p>

  <input id="email" placeholder="이메일 입력" />

  <button class="primary" onclick="sendMagicLink()">매직링크 보내기</button>

  <div id="msg"></div>
</div>

<div id="app" style="display:none;">
  <h1>로그인 성공 🎉</h1>
</div>

<script>
const SUPABASE_URL = "https://syyaknckmtzfasqnxsjx.supabase.co";
const SUPABASE_KEY = "sb_publishable_9-vt45dMALdP9HVVawxdCw_cjmoOWbL";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 로그인 상태 확인
async function checkLogin() {
  const { data } = await supabase.auth.getSession();

  if (data.session) {
    document.getElementById("authBox").style.display = "none";
    document.getElementById("app").style.display = "block";
  }
}

checkLogin();

// 매직링크 보내기
async function sendMagicLink() {
  const email = document.getElementById("email").value;

  const { error } = await supabase.auth.signInWithOtp({
    email,
    options: {
      shouldCreateUser: false, // 🔥 이게 핵심
      emailRedirectTo: window.location.href
    }
  });

  if (error) {
    document.getElementById("msg").innerHTML =
      '<div class="error">등록된 이메일이 아닙니다.</div>';
  } else {
    document.getElementById("msg").innerHTML =
      '<div>메일을 확인해주세요!</div>';
  }
}
</script>

</body>
</html>
